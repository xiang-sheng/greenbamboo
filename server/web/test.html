<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎋 GreenBamboo API 测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header p { opacity: 0.9; }
        .content { padding: 30px; }
        
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .section h2 {
            color: #4CAF50;
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 500;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4CAF50;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .response {
            margin-top: 15px;
            padding: 15px;
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .response.success { border-left: 4px solid #4CAF50; }
        .response.error { border-left: 4px solid #f44336; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }
        .card h3 {
            color: #4CAF50;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .card p {
            color: #666;
            font-size: 13px;
        }
        .card .value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-top: 5px;
        }
        
        .token-display {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            word-break: break-all;
            font-size: 12px;
        }
        .token-display strong { color: #856404; }
        
        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #4CAF50;
            color: white;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎋 GreenBamboo API 测试</h1>
            <p>健康如竹，节节高 - 后端 API 测试工具</p>
        </div>
        
        <div class="content">
            <!-- 服务器配置 -->
            <div class="section">
                <h2>⚙️ 服务器配置</h2>
                <div class="form-group">
                    <label>服务器地址</label>
                    <input type="text" id="baseUrl" value="http://localhost:3000" placeholder="http://localhost:3000">
                </div>
                <div class="token-display" id="tokenDisplay" style="display:none;">
                    <strong>🔑 Token:</strong> <span id="tokenValue"></span>
                </div>
            </div>
            
            <!-- 认证模块 -->
            <div class="section">
                <h2>🔐 认证 <span class="badge" id="authBadge">未登录</span></h2>
                <div class="grid">
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="email" value="test@example.com" placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="password" value="password123" placeholder="••••••••">
                    </div>
                </div>
                <div class="quick-actions">
                    <button class="btn btn-primary" onclick="register()">📝 注册</button>
                    <button class="btn btn-primary" onclick="login()">🔑 登录</button>
                    <button class="btn btn-secondary" onclick="logout()">🚪 登出</button>
                </div>
                <div class="response" id="authResponse" style="display:none;"></div>
            </div>
            
            <!-- 指标管理 -->
            <div class="section" id="metricsSection" style="display:none;">
                <h2>📊 指标管理</h2>
                <div class="quick-actions">
                    <button class="btn btn-primary" onclick="getMetrics()">📋 获取指标列表</button>
                    <button class="btn btn-secondary" onclick="showCreateMetric()">➕ 创建指标</button>
                </div>
                <div class="response" id="metricsResponse" style="display:none;"></div>
            </div>
            
            <!-- 记录管理 -->
            <div class="section" id="recordsSection" style="display:none;">
                <h2>📝 记录管理</h2>
                <div class="grid">
                    <div class="form-group">
                        <label>指标</label>
                        <select id="metricSelect">
                            <option value="">选择指标...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>数值</label>
                        <input type="number" id="recordValue" placeholder="如：65.5" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <input type="text" id="recordNote" placeholder="如：晨起空腹">
                    </div>
                </div>
                <div class="quick-actions">
                    <button class="btn btn-primary" onclick="createRecord()">➕ 创建记录</button>
                    <button class="btn btn-primary" onclick="getRecords()">📋 获取记录列表</button>
                    <button class="btn btn-secondary" onclick="createBulkRecords()">📦 批量创建</button>
                </div>
                <div class="response" id="recordsResponse" style="display:none;"></div>
            </div>
            
            <!-- 统计分析 -->
            <div class="section" id="statsSection" style="display:none;">
                <h2>📈 统计分析</h2>
                <div class="grid" id="statsCards">
                    <div class="card">
                        <h3>记录数</h3>
                        <div class="value" id="statCount">-</div>
                    </div>
                    <div class="card">
                        <h3>平均值</h3>
                        <div class="value" id="statAvg">-</div>
                    </div>
                    <div class="card">
                        <h3>最小值</h3>
                        <div class="value" id="statMin">-</div>
                    </div>
                    <div class="card">
                        <h3>最大值</h3>
                        <div class="value" id="statMax">-</div>
                    </div>
                </div>
                <div class="quick-actions">
                    <button class="btn btn-primary" onclick="getStats()">📊 获取统计</button>
                    <button class="btn btn-primary" onclick="getTrend()">📉 获取趋势</button>
                </div>
                <div class="response" id="statsResponse" style="display:none;"></div>
            </div>
            
            <!-- 数据同步 -->
            <div class="section" id="syncSection" style="display:none;">
                <h2>🔄 数据同步</h2>
                <div class="quick-actions">
                    <button class="btn btn-primary" onclick="syncData()">🔄 同步数据</button>
                </div>
                <div class="response" id="syncResponse" style="display:none;"></div>
            </div>
            
            <!-- 健康检查 -->
            <div class="section">
                <h2>💚 系统状态</h2>
                <div class="quick-actions">
                    <button class="btn btn-primary" onclick="healthCheck()">❤️ 健康检查</button>
                </div>
                <div class="response" id="healthResponse" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script>
        let authToken = null;
        let metrics = [];

        function getBaseUrl() {
            return document.getElementById('baseUrl').value.trim();
        }

        function showResponse(elementId, data, isError = false) {
            const el = document.getElementById(elementId);
            el.style.display = 'block';
            el.className = 'response ' + (isError ? 'error' : 'success');
            el.textContent = JSON.stringify(data, null, 2);
        }

        async function apiRequest(endpoint, method = 'GET', body = null) {
            const url = getBaseUrl() + endpoint;
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                }
            };
            if (authToken) {
                options.headers['Authorization'] = 'Bearer ' + authToken;
            }
            if (body) {
                options.body = JSON.stringify(body);
            }
            
            const response = await fetch(url, options);
            return await response.json();
        }

        // 认证功能
        async function register() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const data = await apiRequest('/api/v1/auth/register', 'POST', { email, password });
                showResponse('authResponse', data);
                if (data.code === 0) {
                    setAuth(data.data);
                }
            } catch (err) {
                showResponse('authResponse', { error: err.message }, true);
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const data = await apiRequest('/api/v1/auth/login', 'POST', { email, password });
                showResponse('authResponse', data);
                if (data.code === 0) {
                    setAuth(data.data);
                }
            } catch (err) {
                showResponse('authResponse', { error: err.message }, true);
            }
        }

        function setAuth(data) {
            authToken = data.token;
            document.getElementById('tokenValue').textContent = authToken.substring(0, 50) + '...';
            document.getElementById('tokenDisplay').style.display = 'block';
            document.getElementById('authBadge').textContent = '已登录';
            document.getElementById('authBadge').style.background = '#4CAF50';
            
            // 显示已认证的功能
            document.getElementById('metricsSection').style.display = 'block';
            document.getElementById('recordsSection').style.display = 'block';
            document.getElementById('statsSection').style.display = 'block';
            document.getElementById('syncSection').style.display = 'block';
            
            // 加载指标
            getMetrics();
        }

        function logout() {
            authToken = null;
            document.getElementById('tokenDisplay').style.display = 'none';
            document.getElementById('authBadge').textContent = '未登录';
            document.getElementById('authBadge').style.background = '#6c757d';
            
            document.getElementById('metricsSection').style.display = 'none';
            document.getElementById('recordsSection').style.display = 'none';
            document.getElementById('statsSection').style.display = 'none';
            document.getElementById('syncSection').style.display = 'none';
        }

        // 指标功能
        async function getMetrics() {
            try {
                const data = await apiRequest('/api/v1/metrics');
                showResponse('metricsResponse', data);
                if (data.code === 0) {
                    metrics = data.data;
                    updateMetricSelect();
                }
            } catch (err) {
                showResponse('metricsResponse', { error: err.message }, true);
            }
        }

        function updateMetricSelect() {
            const select = document.getElementById('metricSelect');
            select.innerHTML = '<option value="">选择指标...</option>';
            metrics.forEach(m => {
                const option = document.createElement('option');
                option.value = m.id;
                option.textContent = `${m.name} (${m.unit})`;
                select.appendChild(option);
            });
        }

        function showCreateMetric() {
            const name = prompt('指标名称:');
            if (!name) return;
            const type = prompt('类型 (number/boolean/select):', 'number');
            const unit = prompt('单位:', '');
            
            apiRequest('/api/v1/metrics', 'POST', { name, type, unit })
                .then(data => showResponse('metricsResponse', data));
        }

        // 记录功能
        async function createRecord() {
            const metricId = document.getElementById('metricSelect').value;
            const value = parseFloat(document.getElementById('recordValue').value);
            const note = document.getElementById('recordNote').value;
            
            if (!metricId || isNaN(value)) {
                alert('请选择指标并输入数值');
                return;
            }
            
            const data = await apiRequest('/api/v1/records', 'POST', {
                metric_id: metricId,
                value,
                note,
                recorded_at: Math.floor(Date.now() / 1000)
            });
            showResponse('recordsResponse', data);
        }

        async function getRecords() {
            const data = await apiRequest('/api/v1/records?limit=20');
            showResponse('recordsResponse', data);
        }

        async function createBulkRecords() {
            const metricId = document.getElementById('metricSelect').value;
            if (!metricId) {
                alert('请选择指标');
                return;
            }
            
            const records = [];
            const now = Math.floor(Date.now() / 1000);
            for (let i = 0; i < 5; i++) {
                records.push({
                    metric_id: metricId,
                    value: 60 + Math.random() * 20,
                    recorded_at: now - (i * 86400)
                });
            }
            
            const data = await apiRequest('/api/v1/records/bulk', 'POST', { records });
            showResponse('recordsResponse', data);
        }

        // 统计功能
        async function getStats() {
            const metricId = document.getElementById('metricSelect').value;
            if (!metricId) {
                alert('请选择指标');
                return;
            }
            
            const data = await apiRequest(`/api/v1/stats/summary?metric_id=${metricId}&days=30`);
            showResponse('statsResponse', data);
            
            if (data.code === 0 && data.data) {
                document.getElementById('statCount').textContent = data.data.count || '-';
                document.getElementById('statAvg').textContent = data.data.avg ? data.data.avg.toFixed(2) : '-';
                document.getElementById('statMin').textContent = data.data.min || '-';
                document.getElementById('statMax').textContent = data.data.max || '-';
            }
        }

        async function getTrend() {
            const metricId = document.getElementById('metricSelect').value;
            if (!metricId) {
                alert('请选择指标');
                return;
            }
            
            const data = await apiRequest(`/api/v1/stats/trend?metric_id=${metricId}&days=30`);
            showResponse('statsResponse', data);
        }

        // 同步功能
        async function syncData() {
            const data = await apiRequest('/api/v1/sync', 'POST', {
                last_sync: Math.floor(Date.now() / 1000) - 3600,
                local_changes: [],
                device_id: 'web_test_' + Date.now(),
                device_name: 'Web Browser',
                app_version: '1.0.0'
            });
            showResponse('syncResponse', data);
        }

        // 健康检查
        async function healthCheck() {
            try {
                const response = await fetch(getBaseUrl() + '/api/v1/health');
                const data = await response.json();
                showResponse('healthResponse', data);
            } catch (err) {
                showResponse('healthResponse', { error: '无法连接服务器: ' + err.message }, true);
            }
        }

        // 页面加载时执行健康检查
        window.onload = function() {
            healthCheck();
        };
    </script>
</body>
</html>
