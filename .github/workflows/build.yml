name: Build Flutter APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Get dependencies
      run: flutter pub get
      working-directory: app
    
    - name: Analyze code
      run: flutter analyze
      working-directory: app
    
    - name: Build APK
      run: flutter build apk --release
      working-directory: app
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: greenbamboo-apk
        path: app/build/app/outputs/flutter-apk/app-release.apk
    
    - name: Get version info
      id: version
      run: |
        VERSION=$(grep 'version:' app/pubspec.yaml | sed 's/version: //')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "build_number=$(date +%s)" >> $GITHUB_OUTPUT
    
    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}-${{ steps.version.outputs.build_number }}
        name: GreenBamboo ${{ steps.version.outputs.version }}
        files: app/build/app/outputs/flutter-apk/app-release.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
