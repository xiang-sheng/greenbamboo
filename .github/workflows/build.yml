name: Build Flutter APK

on:
  push:
    branches: [main, master]
    paths:
      - 'greenbamboo/app/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
        working-directory: greenbamboo/app
      
      - name: Analyze code
        run: flutter analyze
        working-directory: greenbamboo/app
        continue-on-error: true
      
      - name: Build APK
        run: flutter build apk --release
        working-directory: greenbamboo/app
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: greenbamboo-apk
          path: greenbamboo/app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
      
      - name: Get version info
        id: version
        run: |
          echo "version=$(date +'%Y.%m.%d')-build${{ github.run_number }}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: GreenBamboo ${{ steps.version.outputs.version }}
          files: greenbamboo/app/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
